<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teleprompter</title>
<style>
  :root {
    color-scheme: dark;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
  }

  /* ---------- Setup panel ---------- */
  #setup {
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 20px;
    gap: 14px;
    max-width: 900px;
    margin: 0 auto;
    overflow-y: auto;
  }
  #setup h1 {
    margin: 0 0 4px 0;
    font-size: 24px;
    font-weight: 600;
  }
  #textInput {
    flex: 1;
    min-height: 200px;
    width: 100%;
    background: #111;
    color: #fff;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 14px;
    font-size: 16px;
    line-height: 1.5;
    resize: vertical;
  }
  .row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .control {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
    min-width: 200px;
  }
  .control label {
    font-size: 13px;
    color: #aaa;
    display: flex;
    justify-content: space-between;
  }
  input[type="range"] {
    width: 100%;
    accent-color: #4da3ff;
  }
  input[type="file"] {
    color: #ccc;
    font-size: 13px;
  }
  button {
    background: #4da3ff;
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 12px 20px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }
  button.secondary {
    background: #222;
    color: #fff;
    border: 1px solid #444;
  }
  button:active { opacity: 0.8; }

  /* ---------- Display / prompter view ---------- */
  #display {
    position: fixed;
    inset: 0;
    background: #000;
    display: none;
    flex-direction: column;
  }
  #display.active { display: flex; }

  #scrollArea {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: none;
    padding: 0 40px;
  }
  #scrollArea::-webkit-scrollbar { display: none; }

  #promptText {
    white-space: pre-wrap;
    word-wrap: break-word;
    font-weight: 600;
    line-height: 1.5;
    padding: 50vh 0;
    transition: font-size 0.1s linear;
  }
  #promptText.mirrored {
    transform: scaleX(-1);
  }

  #centerLine {
    position: fixed;
    left: 0;
    right: 0;
    top: 50%;
    height: 2px;
    background: rgba(77, 163, 255, 0.5);
    pointer-events: none;
    display: none;
  }
  #centerLine.show { display: block; }

  #hud {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 14px 18px;
    background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0));
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    transition: opacity 0.3s ease;
  }
  #hud.hidden { opacity: 0; pointer-events: none; }

  #hud .control { min-width: 140px; }

  .hud-buttons {
    display: flex;
    gap: 8px;
  }
  .hud-buttons button {
    padding: 10px 16px;
    font-size: 14px;
  }
  .icon-btn {
    background: #222;
    color: #fff;
    border: 1px solid #444;
    padding: 10px 14px;
  }

  .hint {
    font-size: 12px;
    color: #666;
  }
</style>
</head>
<body>

<!-- ===================== SETUP VIEW ===================== -->
<div id="setup">
  <h1>Teleprompter</h1>
  <textarea id="textInput" placeholder="Paste or type your script here...">Welcome to your teleprompter.

Paste or type your script in this box, or upload a text file below.

Adjust the text size and scroll speed with the sliders, then press Start to begin.

While the prompter is running:
&#8226; Space = play / pause
&#8226; Up / Down arrows = adjust speed
&#8226; Esc = exit to editor
</textarea>

  <div class="row">
    <input type="file" id="fileInput" accept=".txt,text/plain">
    <span class="hint">Upload a .txt file (optional)</span>
  </div>

  <div class="row">
    <div class="control">
      <label>Text size <span id="setupSizeVal">48px</span></label>
      <input type="range" id="setupSize" min="16" max="140" value="48">
    </div>
    <div class="control">
      <label>Scroll speed <span id="setupSpeedVal">5</span></label>
      <input type="range" id="setupSpeed" min="1" max="20" value="5">
    </div>
  </div>

  <div class="row">
    <label class="hint" style="display:flex;align-items:center;gap:6px;">
      <input type="checkbox" id="setupMirror" style="width:auto;"> Mirror text (for teleprompter glass)
    </label>
    <label class="hint" style="display:flex;align-items:center;gap:6px;">
      <input type="checkbox" id="setupCenterLine" style="width:auto;" checked> Show center guide line
    </label>
  </div>

  <div class="row">
    <button id="startBtn">Start Teleprompter</button>
  </div>
</div>

<!-- ===================== DISPLAY VIEW ===================== -->
<div id="display">
  <div id="centerLine"></div>
  <div id="scrollArea"><div id="promptText"></div></div>

  <div id="hud">
    <div class="hud-buttons">
      <button id="playPauseBtn">Play</button>
      <button id="resetBtn" class="secondary">Reset</button>
      <button id="editBtn" class="secondary">Edit Text</button>
    </div>
    <div class="control">
      <label>Size <span id="sizeVal">48px</span></label>
      <input type="range" id="sizeSlider" min="16" max="140" value="48">
    </div>
    <div class="control">
      <label>Speed <span id="speedVal">5</span></label>
      <input type="range" id="speedSlider" min="1" max="20" value="5">
    </div>
    <button id="mirrorBtn" class="icon-btn">Mirror</button>
    <button id="fullscreenBtn" class="icon-btn">Fullscreen</button>
  </div>
</div>

<script>
(function () {
  const setup = document.getElementById('setup');
  const display = document.getElementById('display');
  const textInput = document.getElementById('textInput');
  const fileInput = document.getElementById('fileInput');

  const setupSize = document.getElementById('setupSize');
  const setupSizeVal = document.getElementById('setupSizeVal');
  const setupSpeed = document.getElementById('setupSpeed');
  const setupSpeedVal = document.getElementById('setupSpeedVal');
  const setupMirror = document.getElementById('setupMirror');
  const setupCenterLine = document.getElementById('setupCenterLine');
  const startBtn = document.getElementById('startBtn');

  const promptText = document.getElementById('promptText');
  const scrollArea = document.getElementById('scrollArea');
  const centerLine = document.getElementById('centerLine');
  const hud = document.getElementById('hud');

  const playPauseBtn = document.getElementById('playPauseBtn');
  const resetBtn = document.getElementById('resetBtn');
  const editBtn = document.getElementById('editBtn');
  const sizeSlider = document.getElementById('sizeSlider');
  const sizeVal = document.getElementById('sizeVal');
  const speedSlider = document.getElementById('speedSlider');
  const speedVal = document.getElementById('speedVal');
  const mirrorBtn = document.getElementById('mirrorBtn');
  const fullscreenBtn = document.getElementById('fullscreenBtn');

  let scrolling = false;
  let mirrored = false;
  let rafId = null;
  let scrollPos = 0; // fractional scrollTop for smooth sub-pixel scrolling
  let hudTimeout = null;

  // ---- File upload ----
  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => { textInput.value = e.target.result; };
    reader.readAsText(file);
  });

  // ---- Setup sliders (live labels) ----
  setupSize.addEventListener('input', () => { setupSizeVal.textContent = setupSize.value + 'px'; });
  setupSpeed.addEventListener('input', () => { setupSpeedVal.textContent = setupSpeed.value; });

  // ---- Start ----
  startBtn.addEventListener('click', () => {
    const text = textInput.value.trim();
    promptText.textContent = text.length ? text : '(No text entered)';

    sizeSlider.value = setupSize.value;
    sizeVal.textContent = setupSize.value + 'px';
    promptText.style.fontSize = setupSize.value + 'px';

    speedSlider.value = setupSpeed.value;
    speedVal.textContent = setupSpeed.value;

    mirrored = setupMirror.checked;
    promptText.classList.toggle('mirrored', mirrored);
    mirrorBtn.classList.toggle('secondary', !mirrored);

    centerLine.classList.toggle('show', setupCenterLine.checked);

    setup.style.display = 'none';
    display.classList.add('active');

    scrollArea.scrollTop = 0;
    scrollPos = 0;
    setPlaying(false);
    showHud();
  });

  // ---- Size slider (display) ----
  sizeSlider.addEventListener('input', () => {
    sizeVal.textContent = sizeSlider.value + 'px';
    promptText.style.fontSize = sizeSlider.value + 'px';
  });

  // ---- Speed slider (display) ----
  speedSlider.addEventListener('input', () => {
    speedVal.textContent = speedSlider.value;
  });

  // ---- Play / Pause ----
  function setPlaying(state) {
    scrolling = state;
    playPauseBtn.textContent = scrolling ? 'Pause' : 'Play';
    if (scrolling) {
      scrollPos = scrollArea.scrollTop;
      lastTime = null;
      rafId = requestAnimationFrame(step);
    } else if (rafId) {
      cancelAnimationFrame(rafId);
      rafId = null;
    }
  }

  let lastTime = null;
  function step(timestamp) {
    if (!scrolling) return;
    if (lastTime === null) lastTime = timestamp;
    const dt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;

    const speed = parseFloat(speedSlider.value); // px-per-second multiplier
    scrollPos += speed * 18 * dt;
    scrollArea.scrollTop = scrollPos;

    // stop at bottom
    if (scrollArea.scrollTop >= scrollArea.scrollHeight - scrollArea.clientHeight - 1) {
      setPlaying(false);
      return;
    }
    rafId = requestAnimationFrame(step);
  }

  playPauseBtn.addEventListener('click', () => setPlaying(!scrolling));

  resetBtn.addEventListener('click', () => {
    setPlaying(false);
    scrollArea.scrollTop = 0;
    scrollPos = 0;
  });

  editBtn.addEventListener('click', exitToEditor);

  function exitToEditor() {
    setPlaying(false);
    display.classList.remove('active');
    setup.style.display = 'flex';
  }

  mirrorBtn.addEventListener('click', () => {
    mirrored = !mirrored;
    promptText.classList.toggle('mirrored', mirrored);
    mirrorBtn.classList.toggle('secondary', !mirrored);
  });

  fullscreenBtn.addEventListener('click', () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen();
    }
  });

  // ---- HUD auto-hide ----
  function showHud() {
    hud.classList.remove('hidden');
    if (hudTimeout) clearTimeout(hudTimeout);
    hudTimeout = setTimeout(() => {
      if (scrolling) hud.classList.add('hidden');
    }, 3000);
  }
  display.addEventListener('mousemove', showHud);
  display.addEventListener('click', showHud);
  showHud();

  // ---- Keyboard shortcuts (active view only) ----
  document.addEventListener('keydown', (e) => {
    if (!display.classList.contains('active')) return;
    switch (e.key) {
      case ' ':
        e.preventDefault();
        setPlaying(!scrolling);
        showHud();
        break;
      case 'ArrowUp':
        e.preventDefault();
        speedSlider.value = Math.min(20, parseFloat(speedSlider.value) + 1);
        speedVal.textContent = speedSlider.value;
        showHud();
        break;
      case 'ArrowDown':
        e.preventDefault();
        speedSlider.value = Math.max(1, parseFloat(speedSlider.value) - 1);
        speedVal.textContent = speedSlider.value;
        showHud();
        break;
      case 'Escape':
        exitToEditor();
        break;
    }
  });
})();
</script>

</body>
</html>
